<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Edit Presentation — Ambivo Content Portal</title>
  <link rel="icon" type="image/png" href="/static/img/favicon.png">
  <link rel="stylesheet" href="/static/css/dashboard.css">
</head>
<body data-api="{{ api_base }}">
  <nav>
    <a class="brand" href="/dashboard">Content Portal</a>
    <div class="user-area">
      <span id="userName"></span>
      <button class="btn-sm btn-ghost" onclick="logout()">Sign out</button>
    </div>
  </nav>

  <div class="container">
    <div class="form-card">
      <h2>Edit Presentation</h2>

      <div id="statsBar" class="stats-bar" style="display:none">
        <div class="stat-item"><span class="stat-value" id="statViews">0</span><span class="stat-label">Views</span></div>
        <div class="stat-item stat-clickable" id="statQueriesWrap"><span class="stat-value" id="statQueries">0</span><span class="stat-label">Total Queries</span></div>
        <div class="stat-item"><span class="stat-value" id="statToday">0</span><span class="stat-label">Today</span></div>
      </div>

      <!-- Chat Queries Modal -->
      <div id="queriesModal" class="modal-overlay" style="display:none">
        <div class="modal-panel">
          <div class="modal-header">
            <h3>Chat Queries</h3>
            <div style="display:flex;gap:.5rem;align-items:center">
              <button class="btn-sm btn-ghost" id="btnClearAllQueries">Clear All</button>
              <button class="modal-close" id="btnCloseQueries">&times;</button>
            </div>
          </div>
          <div class="modal-body" id="queriesBody">
            <div class="loading">Loading queries...</div>
          </div>
          <div class="modal-footer" id="queriesFooter" style="display:none">
            <button class="btn-sm btn-ghost" id="btnQueriesPrev" disabled>&laquo; Prev</button>
            <span id="queriesPageInfo" style="font-size:.85rem;color:#6b7280"></span>
            <button class="btn-sm btn-ghost" id="btnQueriesNext" disabled>Next &raquo;</button>
          </div>
        </div>
      </div>

      <div class="loading" id="editLoading">Loading presentation...</div>

      <div id="editContent" style="display:none">
        <div class="form-error" id="formError"></div>

        <form id="editForm" data-id="{{ presentation_id }}">
          <label for="f_title">Title</label>
          <input type="text" id="f_title" required placeholder="My Awesome Page">

          <label for="f_desc">Description (optional)</label>
          <input type="text" id="f_desc" placeholder="A short summary">

          <label for="f_slug">Slug</label>
          <input type="text" id="f_slug" disabled style="background:#f3f4f6;color:#6b7280">
          <p class="form-hint">Slug cannot be changed after creation</p>

          <label>Tags</label>
          <div class="tags-input" id="tagsContainer">
            <input type="text" placeholder="Type and press Enter">
          </div>

          <div class="toggle-row">
            <label for="f_chat">Chat enabled</label>
            <div class="toggle">
              <input type="checkbox" id="f_chat" checked>
              <span class="slider"></span>
            </div>
          </div>

          <div class="toggle-row">
            <label for="f_access">Access code protected</label>
            <div class="toggle">
              <input type="checkbox" id="f_access">
              <span class="slider"></span>
            </div>
          </div>
          <div id="accessCodesSection" style="display:none">
            <label style="margin-bottom:.3rem">Access codes:</label>
            <div class="access-codes-list" id="accessCodesList"></div>
            <div style="display:flex;gap:.5rem;align-items:center;margin:.5rem 0">
              <input type="text" id="newCodeInput" placeholder="Custom code (A-Z, 0-9)" style="flex:1;margin:0" maxlength="12">
              <button type="button" class="btn-sm btn-primary" id="btnAddCode">Add</button>
              <button type="button" class="btn-sm btn-ghost" id="btnAutoGen">Auto-generate</button>
            </div>
            <button type="button" class="btn-sm btn-ghost" id="btnRegenCodes" style="margin-bottom:1rem">Regenerate All</button>
          </div>

          <div class="toggle-row">
            <label for="f_header">Page header</label>
            <div class="toggle">
              <input type="checkbox" id="f_header">
              <span class="slider"></span>
            </div>
          </div>
          <div id="headerSection" style="display:none">
            <div class="header-fields">
              <label>Logo (max 1 MB)</label>
              <input type="file" id="f_logo" accept="image/*" style="margin-bottom:.75rem">
              <div id="logoPreviewWrap" style="display:none;margin-bottom:.75rem">
                <img id="logoPreview" style="max-height:64px;border-radius:4px">
                <button type="button" class="btn-sm btn-ghost" id="btnRemoveLogo" style="margin-left:.5rem">Remove</button>
              </div>
              <label for="f_link_url">Link URL</label>
              <input type="text" id="f_link_url" placeholder="https://www.example.com">
              <label for="f_link_text">Link display text (optional)</label>
              <input type="text" id="f_link_text" placeholder="My Company">
              <label for="f_header_email">Email (optional)</label>
              <input type="text" id="f_header_email" placeholder="info@example.com">
              <label for="f_header_phone">Phone (optional)</label>
              <input type="text" id="f_header_phone" placeholder="+1-555-0100">
              <label for="f_header_text">Additional text (optional)</label>
              <input type="text" id="f_header_text" placeholder="Tagline or address">
            </div>
          </div>

          <label>Markdown Content</label>
          <div class="preview-toggle">
            <button type="button" id="btnWrite" class="active">Write</button>
            <button type="button" id="btnPreview">Preview</button>
          </div>
          <textarea id="f_md" class="md-editor" required placeholder="# Your Markdown here..."></textarea>
          <div class="md-preview" id="mdPreview"></div>

          <div class="form-actions">
            <a class="btn-sm btn-ghost" href="/dashboard">Cancel</a>
            <button type="submit" class="btn-sm btn-primary" id="submitBtn">Update Presentation</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/turndown/dist/turndown.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/turndown-plugin-gfm/dist/turndown-plugin-gfm.js"></script>
  <script src="/static/js/dashboard.js"></script>
</body>
</html>
