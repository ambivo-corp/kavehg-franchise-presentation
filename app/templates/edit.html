<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Edit Presentation — Ambivo Content Portal</title>
  <link rel="icon" type="image/png" href="/static/img/favicon.png">
  <link rel="stylesheet" href="/static/css/dashboard.css">
</head>
<body data-api="{{ api_base }}">
  <nav>
    <a class="brand" href="/dashboard">Content Portal</a>
    <div class="user-area">
      <span id="userName"></span>
      <button class="btn-sm btn-ghost" onclick="logout()">Sign out</button>
    </div>
  </nav>

  <div class="container">
    <div class="form-card">
      <h2>Edit Presentation</h2>

      <div id="statsBar" class="stats-bar" style="display:none">
        <div class="stat-item"><span class="stat-value" id="statViews">0</span><span class="stat-label">Views</span></div>
        <div class="stat-item"><span class="stat-value" id="statQueries">0</span><span class="stat-label">Total Queries</span></div>
        <div class="stat-item"><span class="stat-value" id="statToday">0</span><span class="stat-label">Today</span></div>
      </div>

      <div class="loading" id="editLoading">Loading presentation...</div>

      <div id="editContent" style="display:none">
        <div class="form-error" id="formError"></div>

        <form id="editForm" data-id="{{ presentation_id }}">
          <label for="f_title">Title</label>
          <input type="text" id="f_title" required placeholder="My Awesome Page">

          <label for="f_desc">Description (optional)</label>
          <input type="text" id="f_desc" placeholder="A short summary">

          <label for="f_slug">Slug</label>
          <input type="text" id="f_slug" disabled style="background:#f3f4f6;color:#6b7280">
          <p class="form-hint">Slug cannot be changed after creation</p>

          <label>Tags</label>
          <div class="tags-input" id="tagsContainer">
            <input type="text" placeholder="Type and press Enter">
          </div>

          <div class="toggle-row">
            <label for="f_chat">Chat enabled</label>
            <div class="toggle">
              <input type="checkbox" id="f_chat" checked>
              <span class="slider"></span>
            </div>
          </div>

          <div class="toggle-row">
            <label for="f_access">Access code protected</label>
            <div class="toggle">
              <input type="checkbox" id="f_access">
              <span class="slider"></span>
            </div>
          </div>
          <div id="accessCodesSection" style="display:none">
            <div class="access-codes-display" id="accessCodesDisplay"></div>
            <button type="button" class="btn-sm btn-ghost" id="btnRegenCodes" style="margin-bottom:1rem">Regenerate Codes</button>
          </div>

          <label>Markdown Content</label>
          <div class="preview-toggle">
            <button type="button" id="btnWrite" class="active">Write</button>
            <button type="button" id="btnPreview">Preview</button>
          </div>
          <textarea id="f_md" class="md-editor" required placeholder="# Your Markdown here..."></textarea>
          <div class="md-preview" id="mdPreview"></div>

          <div class="form-actions">
            <a class="btn-sm btn-ghost" href="/dashboard">Cancel</a>
            <button type="submit" class="btn-sm btn-primary" id="submitBtn">Update Presentation</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/turndown/dist/turndown.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/turndown-plugin-gfm/dist/turndown-plugin-gfm.js"></script>
  <script src="/static/js/dashboard.js"></script>
</body>
</html>
