<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>New Presentation — Ambivo Content Portal</title>
  <link rel="icon" type="image/png" href="/static/img/favicon.png">
  <link rel="stylesheet" href="/static/css/dashboard.css">
</head>
<body data-api="{{ api_base }}">
  <nav>
    <a class="brand" href="/dashboard">Content Portal</a>
    <div class="user-area">
      <span id="userName"></span>
      <button class="btn-sm btn-ghost" onclick="logout()">Sign out</button>
    </div>
  </nav>

  <div class="container">
    <div class="form-card">
      <h2>New Presentation</h2>
      <div class="form-error" id="formError"></div>

      <form id="createForm">
        <label for="f_title">Title</label>
        <input type="text" id="f_title" required placeholder="My Awesome Page">

        <label for="f_desc">Description (optional)</label>
        <input type="text" id="f_desc" placeholder="A short summary">

        <label for="f_slug">Slug (optional — auto-generated from title)</label>
        <input type="text" id="f_slug" placeholder="my-awesome-page">
        <p class="form-hint">Leave blank to auto-generate from title</p>

        <label>Tags</label>
        <div class="tags-input" id="tagsContainer">
          <input type="text" placeholder="Type and press Enter">
        </div>

        <div class="toggle-row">
          <label for="f_chat">Chat enabled</label>
          <div class="toggle">
            <input type="checkbox" id="f_chat" checked>
            <span class="slider"></span>
          </div>
        </div>

        <div class="toggle-row">
          <label for="f_access">Access code protected</label>
          <div class="toggle">
            <input type="checkbox" id="f_access">
            <span class="slider"></span>
          </div>
        </div>
        <div id="accessCodesSection" style="display:none">
          <label for="f_num_codes">Number of access codes</label>
          <input type="number" id="f_num_codes" min="1" max="20" value="3" style="width:80px;margin-bottom:1rem">
          <p class="form-hint">Codes will be auto-generated after creation</p>
        </div>

        <div class="toggle-row">
          <label for="f_header">Page header</label>
          <div class="toggle">
            <input type="checkbox" id="f_header">
            <span class="slider"></span>
          </div>
        </div>
        <div id="headerSection" style="display:none">
          <div class="header-fields">
            <label>Logo (max 1 MB)</label>
            <input type="file" id="f_logo" accept="image/*" style="margin-bottom:.75rem">
            <div id="logoPreviewWrap" style="display:none;margin-bottom:.75rem">
              <img id="logoPreview" style="max-height:64px;border-radius:4px">
            </div>
            <label for="f_link_url">Link URL</label>
            <input type="text" id="f_link_url" placeholder="https://www.example.com">
            <label for="f_link_text">Link display text (optional)</label>
            <input type="text" id="f_link_text" placeholder="My Company">
            <label for="f_header_email">Email (optional)</label>
            <input type="text" id="f_header_email" placeholder="info@example.com">
            <label for="f_header_phone">Phone (optional)</label>
            <input type="text" id="f_header_phone" placeholder="+1-555-0100">
            <label for="f_header_text">Additional text (optional)</label>
            <input type="text" id="f_header_text" placeholder="Tagline or address">
          </div>
        </div>

        <label>Markdown Content</label>
        <div class="preview-toggle">
          <button type="button" id="btnWrite" class="active">Write</button>
          <button type="button" id="btnPreview">Preview</button>
        </div>
        <textarea id="f_md" class="md-editor" required placeholder="# Your Markdown here..."></textarea>
        <div class="md-preview" id="mdPreview"></div>

        <div class="form-actions">
          <a class="btn-sm btn-ghost" href="/dashboard">Cancel</a>
          <button type="submit" class="btn-sm btn-primary" id="submitBtn">Create Presentation</button>
        </div>
      </form>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/turndown/dist/turndown.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/turndown-plugin-gfm/dist/turndown-plugin-gfm.js"></script>
  <script src="/static/js/dashboard.js"></script>
</body>
</html>
