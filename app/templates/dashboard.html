<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard — Ambivo Content Portal</title>
  <link rel="icon" type="image/png" href="/static/img/favicon.png">
  <link rel="stylesheet" href="/static/css/dashboard.css">
</head>
<body data-api="{{ api_base }}">
  <nav>
    <a class="brand" href="/dashboard">Content Portal</a>
    <div class="user-area">
      <span id="userName"></span>
      <button class="btn-sm btn-ghost" onclick="logout()">Sign out</button>
    </div>
  </nav>

  <div class="container">
    <div class="header-row">
      <h2>Presentations</h2>
      <a class="btn-sm btn-primary" href="/dashboard/create">+ New Presentation</a>
    </div>

    <div class="table-wrap">
      <div class="loading" id="loading">Loading...</div>
      <table id="table" style="display:none">
        <thead>
          <tr>
            <th>Title</th>
            <th>Slug</th>
            <th>Status</th>
            <th>Chat</th>
            <th>Views</th>
            <th>Queries (today)</th>
            <th>Created</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
      <div class="empty" id="empty" style="display:none">No presentations yet. Create your first one!</div>
    </div>
  </div>

  <!-- Chat Queries Modal (shared with edit page) -->
  <div id="queriesModal" class="modal-overlay" style="display:none">
    <div class="modal-panel">
      <div class="modal-header">
        <h3>Chat Queries</h3>
        <div style="display:flex;gap:.5rem;align-items:center">
          <button class="btn-sm btn-ghost" id="btnClearAllQueries">Clear All</button>
          <button class="modal-close" id="btnCloseQueries">&times;</button>
        </div>
      </div>
      <div class="modal-body" id="queriesBody">
        <div class="loading">Loading queries...</div>
      </div>
      <div class="modal-footer" id="queriesFooter" style="display:none">
        <button class="btn-sm btn-ghost" id="btnQueriesPrev" disabled>&laquo; Prev</button>
        <span id="queriesPageInfo" style="font-size:.85rem;color:#6b7280"></span>
        <button class="btn-sm btn-ghost" id="btnQueriesNext" disabled>Next &raquo;</button>
      </div>
    </div>
  </div>

  <script src="/static/js/dashboard.js"></script>
</body>
</html>
